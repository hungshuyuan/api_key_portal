
# 新增這個區塊：將 HTTP 強制導向 HTTPS
server {
    listen 80;
    server_name nkustapikey.54ucl.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name nkustapikey.54ucl.com;

    ssl_certificate /etc/letsencrypt/live/nkustapikey.54ucl.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nkustapikey.54ucl.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # =========================
    # 前端靜態檔（production build）
    # 直接由 nginx 提供 /portal/ 下的靜態資源
    # =========================
    location /portal/ {
    alias /usr/share/nginx/html/portal/;
    index index.html;

    try_files $uri $uri/ /portal/index.html;
}

    # =========================
    # 前端發往 /portal/api/ 的請求，轉發到後端 API
    # 會將 /portal/api/ 轉成 /api/ 並 proxy 給本機後端
    # =========================
    location /portal/api/ {
        proxy_pass http://127.0.0.1:5000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 可保留原本的 /api/ 位置（非必要），若不需要可刪除
    location /api/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # =========================
    # 避免 root / favicon 亂掉
    # =========================
    location / {
        return 404;
    }
}